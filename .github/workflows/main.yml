name: Talib-Job CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- TESTS BACKEND ---
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Backend Dependencies
        run: |
          cd talibJobBackend
          composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts

      - name: Prepare Environment
        run: |
          cd talibJobBackend
          cp .env.example .env
          php artisan key:generate
          # Créer une base de données SQLite vide pour les tests
          touch database/database.sqlite 

      - name: Execute Tests
        run: |
          cd talibJobBackend
          # On force l'utilisation de SQLite en mémoire pour que ça marche sur GitHub
          php artisan test --env=testing
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # --- TESTS FRONTEND (Qui marchent déjà chez toi) ---
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Frontend Dependencies
        run: cd talibJobFrontend && npm install
      - name: Run Jest Tests
        run: cd talibJobFrontend && npm test -- --watchAll=false

  # --- DÉPLOIEMENT (S'active uniquement si Backend + Frontend sont OK) ---
  deploy:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Signal
        run: echo "🚀 Tout est validé ! Prêt pour le déploiement final."